<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设备管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="devices">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="brand-kicker">IoT Message Hub</p>
          <h1>设备管理</h1>
        </div>
        <nav class="topnav">
          <a class="topnav-link" href="./">监控主页</a>
          <a class="topnav-link active" href="./devices.html">设备管理</a>
        </nav>
      </header>

      <section class="status-strip">
        <div class="status-card">
          <span>设备总数</span>
          <strong id="stat-total-devices">0</strong>
        </div>
        <div class="status-card">
          <span>在线设备</span>
          <strong id="stat-online-devices">0</strong>
        </div>
        <div class="status-card">
          <span>报警设备</span>
          <strong id="stat-alert-devices">0</strong>
        </div>
        <p class="status-note" id="last-updated">等待数据...</p>
      </section>

      <main class="content-panel">
        <div class="panel-head compact">
          <div>
            <h2>设备列表</h2>
            <p>在这里查看全部设备，并执行删除操作。</p>
          </div>
        </div>

        <div class="toolbar-row">
          <label class="search-field inline">
            <span>设备搜索</span>
            <input id="device-search-input" type="search" placeholder="输入序列号快速定位设备" />
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>设备序列号</th>
                <th>状态</th>
                <th>压力</th>
                <th>温度</th>
                <th>报警</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="management-table-body">
              <tr class="empty-row">
                <td colspan="7">当前还没有设备数据</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="./shared.js"></script>
    <script src="./devices.js"></script>
  </body>
</html>
